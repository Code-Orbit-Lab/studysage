# Render deploy config for the backend service.
# Fill in once the Render project exists — this is a starting point.
services:
  - type: web
    name: studysage-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    # Migrations run before the server binds to $PORT on every deploy --
    # if `alembic upgrade head` fails, the deploy fails instead of booting
    # the app against a schema it doesn't match.
    startCommand: "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false